<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>每日五行開運撕曆</title>
    <meta name="theme-color" content="#D4AF77">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        :root { --gold: #D4AF77; }
        body { margin:0; padding:0; font-family:'Noto Serif TC',serif; background:linear-gradient(#f8f1e3,#e8d9c4); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .calendar { width:92vw; max-width:420px; background:#fff; border-radius:12px; box-shadow:0 20px 40px rgba(0,0,0,0.15); position:relative; overflow:hidden; border:12px solid #f5f0e8; }
        .tear { position:absolute; top:-8px; left:0; right:0; height:28px; background:repeating-linear-gradient(90deg,#f8f5f0,#f8f5f0 12px,#e8d9c4 12px,#e8d9c4 24px); border-bottom:4px solid #d4af77; border-radius:50% 50% 0 0; }
        .header { text-align:center; padding:20px 20px 10px; position:relative; }
        .header h1 { font-size:1.35rem; margin:0; color:var(--gold); letter-spacing:2px; }
        .name { position:absolute; right:24px; top:24px; font-size:0.95rem; color:#D4AF77; }
        .date { font-size:2.1rem; font-weight:700; margin:8px 0 4px; }
        .ganzhi { font-size:0.95rem; color:#666; margin-bottom:12px; }
        .gold-line { height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:0 30px; }
        .nav { display:flex; justify-content:space-between; align-items:center; padding:0 20px; font-size:1.8rem; color:#D4AF77; }
        .source { margin:18px 24px; padding:14px 18px; background:#f8f5f0; border:1px solid var(--gold); border-radius:12px; font-size:0.88rem; line-height:1.5; }
        .source-title { color:var(--gold); font-weight:700; font-size:1.05rem; }
        .day-branch { font-size:1.3rem; font-weight:700; color:#222; text-align:center; margin:8px 0; }
        .icons { display:flex; justify-content:center; gap:14px; margin:10px 0; font-size:1.6rem; }
        .rank { padding:16px 24px; border-bottom:1px solid #f0e8d8; }
        .rank:last-child { border-bottom:none; }
        .rank-header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
        .rank-num { font-size:1.35rem; font-weight:700; color:var(--gold); }
        .swatches { display:flex; gap:8px; margin:12px 0; }
        .swatch { width:58px; height:58px; border-radius:8px; box-shadow:3px 3px 8px rgba(0,0,0,0.15); }
        .bad { margin:20px 24px; padding:14px 18px; background:#f8f5f0; border-radius:12px; font-size:0.82rem; opacity:0.75; }
        .bad-title { color:#888; margin-bottom:8px; font-weight:700; }
    </style>
</head>
<body>
    <div class="calendar" id="calendar">
        <div class="tear"></div>
        <div class="header">
            <h1>每日五行開運穿搭建議</h1>
            <div class="name">羅羽珊</div>
            <div class="date" id="date"></div>
            <div class="ganzhi" id="ganzhi"></div>
            <div class="gold-line"></div>
        </div>

        <div class="nav">
            <span id="prev">←</span>
            <span id="current-date" style="font-size:1.1rem;font-weight:700;color:#666;"></span>
            <span id="next">→</span>
        </div>

        <div class="source" id="source">
            <div class="source-title">財之來源</div>
            <div id="source-text"></div>
            <div class="day-branch" id="day-branch"></div>
            <div class="icons" id="icons"></div>
            <div style="font-size:0.78rem;color:#666;line-height:1.4;" id="reminder"></div>
        </div>

        <div id="ranks"></div>

        <div class="bad">
            <div class="bad-title">不佳之色系（主色避免）</div>
            <div id="bad-content"></div>
        </div>

        <div style="text-align:center;font-size:0.75rem;color:#aaa;padding:12px 0;">左右滑動切換日期 • 好運穿上身</div>
    </div>

    <script>
        let dataSet = {};
        let dates = [];
        let currentIndex = 0;

        async function loadData() {
            try {
                const response = await fetch('./data.json');
                dataSet = await response.json();
                dates = Object.keys(dataSet);
                currentIndex = dates.indexOf("2026-05-10") !== -1 ? dates.indexOf("2026-05-10") : 0;
                render(currentIndex);
            } catch (e) {
                console.error("載入資料失敗", e);
                alert("資料載入失敗，請確認 data.json 已上傳");
            }
        }

        function render(index) {
            const d = dataSet[dates[index]];
            if (!d) return;
            document.getElementById("date").textContent = d.dateStr;
            document.getElementById("ganzhi").innerHTML = d.ganzhi;
            document.getElementById("current-date").textContent = d.dateStr;
            document.getElementById("source-text").innerHTML = `<strong>${d.source}</strong>`;
            document.getElementById("day-branch").innerHTML = d.dayBranch;
            document.getElementById("icons").innerHTML = `🪨 🌳 💧 🔥 🌍`;
            document.getElementById("reminder").innerHTML = `鞋子、襪子、包包、圍巾等配件可小面積搭配（面積不超過身體1/10）<br>愈多單品配合愈好`;

            let ranksHTML = "";
            d.ranks.forEach(r => {
                ranksHTML += `<div class="rank"><div class="rank-header"><span class="rank-num">第${r.rank}名</span><span style="font-size:1.4rem;font-weight:700;">${r.element}色系列　${r.score}分</span></div><div style="display:flex;gap:6px;color:#d4af77;font-size:1.1rem;">${r.benefits.join('　')}</div><div class="swatches">${r.swatches.map(c => `<div class="swatch" style="background:${c}"></div>`).join('')}</div>${r.desc ? `<div style="font-size:0.9rem;color:#555;">${r.desc}</div>` : ''}</div>`;
            });
            document.getElementById("ranks").innerHTML = ranksHTML;

            let badHTML = d.bad.map(b => `<div style="margin:8px 0;padding:8px 12px;background:#f0e8d8;border-radius:8px;font-size:0.9rem;"><strong>${b.element}色系列</strong>　${b.reason}</div>`).join('');
            document.getElementById("bad-content").innerHTML = badHTML;
        }

        function changeDate(delta) {
            currentIndex = (currentIndex + delta + dates.length) % dates.length;
            render(currentIndex);
        }

        document.getElementById("prev").addEventListener("click", () => changeDate(-1));
        document.getElementById("next").addEventListener("click", () => changeDate(1));

        let startX = 0;
        document.getElementById("calendar").addEventListener("touchstart", e => startX = e.touches[0].clientX);
        document.getElementById("calendar").addEventListener("touchend", e => {
            const endX = e.changedTouches[0].clientX;
            if (startX - endX > 80) changeDate(1);
            else if (endX - startX > 80) changeDate(-1);
        });

        window.onload = loadData;
    </script>
</body>
</html>
